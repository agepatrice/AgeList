<style>
:root {
  --pink: #E8417A;
  --gold: #C8922A;
  --noir: #1A1018;
  --noir2: #2a1f28;
  --noir3: #3d2e3a;
  --surface: #231a21;
  --surface2: #2e2330;
  --text: #f5eef3;
  --text2: #b8a8b5;
  --text3: #7a6577;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--noir); font-family: 'DM Sans', sans-serif; color: var(--text); overscroll-behavior: none; }

/* App shell */
#app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; }

/* Header */
.app-header { padding: 52px 20px 16px; background: linear-gradient(180deg, var(--noir) 0%, var(--noir) 80%, transparent 100%); position: relative; z-index: 10; }
.app-header-row { display: flex; align-items: flex-start; justify-content: space-between; }
.app-title { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); line-height: 1; }
.app-title span { color: var(--pink); font-style: italic; }
.app-date { font-size: 12px; color: var(--text3); margin-top: 4px; letter-spacing: .03em; }
.header-actions { display: flex; gap: 8px; margin-top: 4px; }

/* Search bar */
.search-wrap { padding: 0 20px 14px; position: relative; }
.search-wrap input { width: 100%; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 24px; padding: 10px 16px 10px 38px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; }
.search-wrap input::placeholder { color: var(--text3); }
.search-icon { position: absolute; left: 34px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text3); pointer-events: none; }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 20px 16px; }
.stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 600; line-height: 1; }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 3px; letter-spacing: .02em; }

/* Filter pills */
.filter-scroll { overflow-x: auto; padding: 0 20px 16px; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-pills { display: flex; gap: 8px; width: max-content; }
.pill { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: all .2s; }
.pill.active { background: var(--pink); border-color: var(--pink); color: white; font-weight: 500; }

/* Task list */
.task-scroll { flex: 1; overflow-y: auto; padding: 0 20px; scrollbar-width: none; padding-bottom: 100px; }
.task-scroll::-webkit-scrollbar { display: none; }
.section-header { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); padding: 12px 0 8px; }
.task-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color .2s, background .2s; display: flex; gap: 12px; align-items: flex-start; }
.task-card:hover, .task-card.expanded { border-color: var(--border2); background: var(--surface2); }
.task-card.done-card { opacity: .4; }
.check-circle { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; margin-top: 1px; }
.check-circle.checked { background: #1D9E75; border-color: #1D9E75; }
.check-circle svg { width: 11px; height: 11px; stroke: white; stroke-width: 2.5; fill: none; }
.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }
.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.cat-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.due-text { font-size: 11px; color: var(--text3); }
.task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.status-pill { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.s-notstarted { background: rgba(255,255,255,.06); color: var(--text3); }
.s-inprogress { background: rgba(56,138,221,.15); color: #85B7EB; }
.s-waiting { background: rgba(239,159,39,.12); color: #FAC775; }
.s-done { background: rgba(29,158,117,.12); color: #5DCAA5; }
.p-dot { width: 8px; height: 8px; border-radius: 50%; }
.p-high { background: #E24B4A; }
.p-med { background: #EF9F27; }
.p-low { background: #1D9E75; }

/* Expanded panel */
.expand-panel { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
.expand-notes { font-size: 13px; color: var(--text2); line-height: 1.6; white-space: pre-wrap; margin-bottom: 10px; }
.expand-actions { display: flex; gap: 8px; }
.btn-sm { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 5px; transition: all .2s; }
.btn-sm:hover { background: var(--surface2); }
.btn-sm.danger { border-color: rgba(226,75,74,.3); color: #F09595; }

/* FAB */
.fab { position: fixed; bottom: 90px; right: max(20px, calc(50vw - 220px)); width: 56px; height: 56px; border-radius: 50%; background: var(--pink); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(232,65,122,.4); z-index: 50; transition: transform .2s; }
.fab:active { transform: scale(.94); }
.fab svg { width: 24px; height: 24px; stroke: white; stroke-width: 2; fill: none; }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--noir2); border-top: 0.5px solid var(--border2); display: flex; padding: 12px 0 24px; z-index: 50; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 0; }
.nav-item svg { width: 22px; height: 22px; stroke: var(--text3); stroke-width: 1.5; fill: none; transition: stroke .2s; }
.nav-item.active svg { stroke: var(--pink); }
.nav-item span { font-size: 10px; color: var(--text3); transition: color .2s; }
.nav-item.active span { color: var(--pink); }

/* Modal overlay */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.center { align-items: center; }
.modal-sheet { background: var(--noir2); border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; scrollbar-width: none; }
.modal-sheet.center-sheet { border-radius: 24px; margin: 20px; max-height: 85vh; }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; color: var(--text3); letter-spacing: .03em; margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color .2s; }
.form-input:focus { border-color: var(--pink); }
.form-input::placeholder { color: var(--text3); }
textarea.form-input { resize: vertical; min-height: 70px; }
.seg-group { display: grid; gap: 8px; }
.seg-group.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.seg-group.cols2 { grid-template-columns: 1fr 1fr; }
.seg-btn { padding: 9px 6px; border-radius: var(--radius-xs); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-align: center; transition: all .2s; }
.seg-btn.active { background: var(--pink); border-color: var(--pink); color: white; font-weight: 500; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-main { flex: 1; padding: 14px; border-radius: var(--radius-sm); border: none; background: var(--pink); color: white; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity .2s; }
.btn-main:active { opacity: .85; }
.btn-cancel { padding: 14px 20px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 15px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.btn-gold { background: var(--gold); }

/* Cat manager */
.cat-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.cat-swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.cat-name { flex: 1; font-size: 14px; color: var(--text); }
.cat-count { font-size: 12px; color: var(--text3); }
.color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s; }
.color-dot.sel { border-color: white; transform: scale(1.15); }

/* Empty */
.empty-state { text-align: center; padding: 48px 20px; }
.empty-state p { font-size: 14px; color: var(--text3); }

/* Swipe nav views */
.view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.view.active { display: flex; }
</style>
</head>

    <div class="stat"><div class="stat-num" style="color:#E24B4A">${active.filter(t=>t.priority==="HIGH").length}</div><div class="stat-label">High</div></div>
    <div class="stat"><div class="stat-num" style="color:#85B7EB">${active.filter(t=>t.status==="In Progress").length}</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num" style="color:#F4C0D1">${active.filter(t=>t.cid==="mk").length}</div><div class="stat-label">MK</div></div>
    <div class="stat"><div class="stat-num" style="color:#5DCAA5">${doneSet.size}</div><div class="stat-label">Done</div></div>
  `;
}

function renderPills(){
  const built=[{key:"all",label:"All"},{key:"high",label:"🔴 Priority"},{key:"active",label:"Active"},{key:"done",label:"Done"}];
  const catPills=categories.map(c=>`<button class="pill${activeFilter===c.id?" active":""}" onclick="setFilter('${c.id}')">${c.name}</button>`).join("");
  document.getElementById("filter-pills").innerHTML=built.map(b=>`<button class="pill${activeFilter===b.key?" active":""}" onclick="setFilter('${b.key}')">${b.label}</button>`).join("")+catPills;
}

function setFilter(f){
  activeFilter=f;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  renderPills();renderTasks();
}

function setTab(f,el){
  activeFilter=f;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");
  renderPills();renderTasks();
}

function filterTasks(){
  let list=[...tasks];
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(t=>t.name.toLowerCase().includes(q)||(t.notes||"").toLowerCase().includes(q)||(getCat(t.cid).name||"").toLowerCase().includes(q));}
  if(activeFilter==="high")list=list.filter(t=>t.priority==="HIGH"&&!doneSet.has(t.id));
  else if(activeFilter==="active")list=list.filter(t=>!doneSet.has(t.id));
  else if(activeFilter==="done")list=list.filter(t=>doneSet.has(t.id));
  else if(!["all"].includes(activeFilter))list=list.filter(t=>t.cid===activeFilter);
  list.sort((a,b)=>{
    const aD=doneSet.has(a.id)?1:0,bD=doneSet.has(b.id)?1:0;
    if(aD!==bD)return aD-bD;
    const pm={HIGH:0,MEDIUM:1,LOW:2};
    return(pm[a.priority]||2)-(pm[b.priority]||2);
  });
  return list;
}

function renderTasks(){
  renderStats();
  const list=filterTasks();
  const el=document.getElementById("task-scroll");
  if(!list.length){el.innerHTML='<div class="empty-state"><p>Nothing here yet</p></div>';return;}
  let html="",lastSec="";
  list.forEach(t=>{
    const done=doneSet.has(t.id);
    const sec=done?"Completed":t.priority==="HIGH"?"High priority":t.priority==="MEDIUM"?"Medium priority":"Lower priority";
    if(sec!==lastSec&&(activeFilter==="all"||activeFilter==="active")){html+=`<div class="section-header">${sec}</div>`;lastSec=sec;}
    const cat=getCat(t.cid);const col=COLORS[cat.ci]||COLORS[7];
    const expanded=expandedId===t.id;
    const checkSvg=done?`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`:"";
    html+=`<div class="task-card${done?" done-card":""}${expanded?" expanded":""}" onclick="toggleExpand(${t.id},event)">
      <button class="check-circle${done?" checked":""}" onclick="toggleDone(${t.id},event)" aria-label="Toggle complete">${checkSvg}</button>
      <div class="task-body">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          <span class="cat-tag" style="background:${col.bg};color:${col.text}">${cat.name}</span>
          ${t.due?`<span class="due-text">Due ${fmtDate(t.due)}</span>`:""}
        </div>
        ${expanded?`<div class="expand-panel">
          ${t.notes?`<div class="expand-notes">${t.notes}</div>`:""}
          <div class="expand-actions">
            <button class="btn-sm" onclick="openEditTask(${t.id},event)">
              <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </button>
            <button class="btn-sm danger" onclick="deleteTask(${t.id},event)">
              <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              Delete
            </button>
          </div>
        </div>`:""}
      </div>
      <div class="task-right">
        <span class="status-pill ${sClass(t.status,done)}">${sLabel(t.status,done)}</span>
        <div class="p-dot ${pClass(t.priority)}"></div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function toggleExpand(id,e){if(e.target.closest(".check-circle,.btn-sm"))return;expandedId=expandedId===id?null:id;renderTasks();}
function toggleDone(id,e){e.stopPropagation();if(doneSet.has(id))doneSet.delete(id);else doneSet.add(id);renderTasks();}
function deleteTask(id,e){e.stopPropagation();if(!confirm("Delete this task?"))return;tasks=tasks.filter(t=>t.id!==id);doneSet.delete(id);expandedId=null;renderTasks();}
function onSearch(v){searchQ=v;renderTasks();}

/* ---- Add Task Modal ---- */
let formPriority="HIGH",formStatus="Not Started",formCatId="mk";

function openAddTask(){
  formPriority="HIGH";formStatus="Not Started";formCatId=categories[0]?.id||"mk";
  showTaskModal(null);
}
function openEditTask(id,e){e.stopPropagation();const t=tasks.find(x=>x.id===id);if(!t)return;formPriority=t.priority;formStatus=t.status;formCatId=t.cid;showTaskModal(t);}

function showTaskModal(t){
  const isEdit=!!t;
  const catOpts=categories.map(c=>`<option value="${c.id}"${(t?t.cid:formCatId)===c.id?" selected":""}>${c.name}</option>`).join("");
  const priBtns=["HIGH","MEDIUM","LOW"].map(p=>`<button class="seg-btn${formPriority===p?" active":""}" onclick="setPri('${p}')">${p==="HIGH"?"🔴 High":p==="MEDIUM"?"🟡 Medium":"🟢 Low"}</button>`).join("");
  const statBtns=["Not Started","In Progress","Waiting","Done"].map(s=>`<button class="seg-btn${formStatus===s?" active":""}" onclick="setStat('${s}')">${s}</button>`).join("");
  document.getElementById("modal-root").innerHTML=`
    <div class="modal-overlay" onclick="bgClose(event)">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="modal-title">${isEdit?"Edit task":"New task"}</div>
        <div class="form-group"><label class="form-label">Task name</label><input class="form-input" id="f-name" type="text" placeholder="What needs to get done?" value="${isEdit?t.name.replace(/"/g,'&quot;'):""}" /></div>
        <div class="form-group"><label class="form-label">Category</label><select class="form-input" id="f-cat" onchange="formCatId=this.value">${catOpts}</select></div>
        <div class="form-group"><label class="form-label">Priority</label><div class="seg-group cols3">${priBtns}</div></div>
        <div class="form-group"><label class="form-label">Status</label><div class="seg-group cols2">${statBtns}</div></div>
        <div class="form-group"><label class="form-label">Due date (optional)</label><input class="form-input" id="f-due" type="date" value="${isEdit&&t.due?t.due:""}" /></div>
        <div class="form-group"><label class="form-label">Notes (optional)</label><textarea class="form-input" id="f-notes" placeholder="Any details or reminders...">${isEdit&&t.notes?t.notes:""}</textarea></div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-main" onclick="${isEdit?`saveEdit(${t.id})`:"saveNew()"}">${isEdit?"Save changes":"Add task"}</button>
        </div>
      </div>
    </div>`;
}

function setPri(p){formPriority=p;const t=tasks.find(x=>x.id===expandedId);showTaskModal(t||null);}
function setStat(s){formStatus=s;const t=tasks.find(x=>x.id===expandedId);showTaskModal(t||null);}

function saveNew(){
  const name=document.getElementById("f-name").value.trim();
  if(!name)return alert("Please enter a task name");
  const t={id:nextId++,name,cid:document.getElementById("f-cat").value,priority:formPriority,status:formStatus,due:document.getElementById("f-due").value,notes:document.getElementById("f-notes").value.trim()};
  tasks.unshift(t);
  if(formStatus==="Done")doneSet.add(t.id);
  closeModal();renderTasks();
}

function saveEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const name=document.getElementById("f-name").value.trim();
  if(!name)return alert("Please enter a task name");
  t.name=name;t.cid=document.getElementById("f-cat").value;
  t.priority=formPriority;t.status=formStatus;
  t.due=document.getElementById("f-due").value;
  t.notes=document.getElementById("f-notes").value.trim();
  if(formStatus==="Done")doneSet.add(id);else doneSet.delete(id);
  closeModal();expandedId=null;renderTasks();
}

/* ---- Category Modal ---- */
let editCatId=null;

function openCatModal(){editCatColorIdx=0;editCatId=null;renderCatModal();}

function renderCatModal(){
  const rows=categories.map(c=>{
    const col=COLORS[c.ci]||COLORS[7];
    const count=tasks.filter(t=>t.cid===c.id).length;
    return`<div class="cat-row">
      <div class="cat-swatch" style="background:${col.dot}"></div>
      <span class="cat-name">${c.name}</span>
      <span class="cat-count">${count}</span>
      <button class="btn-sm" onclick="startEditCat('${c.id}',event)" style="padding:5px 10px">Edit</button>
      ${count===0?`<button class="btn-sm danger" onclick="deleteCat('${c.id}',event)" style="padding:5px 10px">Delete</button>`:""}
    </div>`;
  }).join("");
  const dots=COLORS.map((c,i)=>`<div class="color-dot${editCatColorIdx===i?" sel":""}" style="background:${c.dot}" onclick="pickCatColor(${i})"></div>`).join("");
  document.getElementById("modal-root").innerHTML=`
    <div class="modal-overlay center" onclick="bgClose(event)">
      <div class="modal-sheet center-sheet" onclick="event.stopPropagation()">
        <div class="modal-title">Categories</div>
        <div style="max-height:220px;overflow-y:auto;margin-bottom:16px">${rows||'<p style="font-size:14px;color:var(--text3)">No categories yet</p>'}</div>
        <div style="border-top:0.5px solid var(--border);padding-top:16px">
          <p style="font-size:12px;color:var(--text3);margin-bottom:10px">${editCatId?"Edit category":"Add new category"}</p>
          <div class="form-group"><input class="form-input" id="cat-name-f" type="text" placeholder="Category name" value="${editCatId?(categories.find(c=>c.id===editCatId)||{name:""}).name:""}" /></div>
          <div class="color-grid">${dots}</div>
        </div>
        <div class="modal-actions" style="margin-top:16px">
          <button class="btn-cancel" onclick="closeModal()">Close</button>
          <button class="btn-main ${editCatId?"":"btn-gold"}" onclick="${editCatId?`saveCatEdit()`:"addCat()"}">${editCatId?"Save changes":"Add category"}</button>
        </div>
      </div>
    </div>`;
}

function pickCatColor(i){editCatColorIdx=i;renderCatModal();}
function startEditCat(id,e){e.stopPropagation();editCatId=id;const cat=categories.find(c=>c.id===id);if(cat)editCatColorIdx=cat.ci;renderCatModal();}

function addCat(){
  const name=document.getElementById("cat-name-f").value.trim();
  if(!name)return alert("Enter a category name");
  if(categories.find(c=>c.name.toLowerCase()===name.toLowerCase()))return alert("Category already exists");
  categories.push({id:"c"+(nextCatId++),name,ci:editCatColorIdx});
  editCatColorIdx=(editCatColorIdx+1)%COLORS.length;
  renderPills();renderCatModal();
}

function saveCatEdit(){
  const name=document.getElementById("cat-name-f").value.trim();
  if(!name)return alert("Enter a category name");
  const cat=categories.find(c=>c.id===editCatId);
  if(cat){cat.name=name;cat.ci=editCatColorIdx;}
  editCatId=null;renderPills();renderTasks();renderCatModal();
}

function deleteCat(id,e){e.stopPropagation();if(!confirm("Delete this category?"))return;categories=categories.filter(c=>c.id!==id);renderPills();renderCatModal();}

function closeModal(){document.getElementById("modal-root").innerHTML="";}
function bgClose(e){if(e.target.classList.contains("modal-overlay"))closeModal();}

/* Init */
document.getElementById("date-label").textContent=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
renderPills();renderTasks();
</script>
</body>
</html>

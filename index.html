<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age's Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --mk-pink: #E8417A;
    --mk-gold: #C8922A;
    --noir: #1A1018;
    --noir-soft: #2C2030;
    --surface: #F7F3F5;
    --card: #FFFFFF;
    --muted: #8C7A87;
    --border: rgba(26,16,24,0.1);
    --urgent-bg: #FFF0F4;
    --urgent-text: #C0315D;
    --gold-bg: #FFF8EE;
    --gold-text: #9B6B15;
    --green-bg: #EDF7F0;
    --green-text: #256B3A;
    --blue-bg: #EEF4FF;
    --blue-text: #2A4EA0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--noir);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--noir);
    padding: 1.5rem 1.25rem 1.25rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: #FFFFFF;
    line-height: 1.1;
  }

  .header-title span {
    color: var(--mk-pink);
  }

  .header-date {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .header-stats {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .stat-pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
  }

  .stat-pill strong {
    color: var(--mk-gold);
    font-weight: 500;
  }

  /* FILTER TABS */
  .filter-bar {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
    flex-shrink: 0;
  }

  .filter-btn.active {
    background: var(--mk-pink);
    border-color: var(--mk-pink);
    color: #fff;
  }

  /* MAIN */
  .main {
    padding: 1.25rem;
    max-width: 680px;
    margin: 0 auto;
  }

  /* ADD TASK BAR */
  .add-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    align-items: stretch;
  }

  .add-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--noir);
    outline: none;
    transition: border-color 0.18s;
  }

  .add-input:focus {
    border-color: var(--mk-pink);
  }

  .add-input::placeholder {
    color: var(--muted);
  }

  .cat-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--noir);
    outline: none;
    cursor: pointer;
    min-width: 100px;
  }

  .add-btn {
    background: var(--mk-pink);
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 20px;
    color: white;
    cursor: pointer;
    line-height: 1;
    transition: opacity 0.18s, transform 0.1s;
  }

  .add-btn:active { transform: scale(0.95); opacity: 0.85; }

  /* SECTION HEADERS */
  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 1.25rem 0 0.6rem;
  }

  .section-label-text {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-count {
    font-size: 10px;
    color: var(--muted);
  }

  /* TASK CARDS */
  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.18s, opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
  }

  .task-card[data-cat="deadline"]::before { background: var(--mk-pink); }
  .task-card[data-cat="videography"]::before { background: var(--mk-gold); }
  .task-card[data-cat="marykay"]::before { background: #D4537E; }
  .task-card[data-cat="content"]::before { background: #638FDD; }
  .task-card[data-cat="church"]::before { background: #639922; }
  .task-card[data-cat="personal"]::before { background: var(--muted); }

  .task-card:active { transform: scale(0.99); }

  .task-card.done {
    opacity: 0.45;
  }

  .task-card.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* CHECKBOX */
  .task-check {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    background: transparent;
  }

  .task-card.done .task-check {
    background: var(--mk-pink);
    border-color: var(--mk-pink);
  }

  .task-card.done .task-check::after {
    content: '';
    display: block;
    width: 5px;
    height: 9px;
    border: 1.5px solid white;
    border-left: none;
    border-top: none;
    transform: rotate(45deg) translate(-1px,-1px);
  }

  /* TASK CONTENT */
  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 14px;
    font-weight: 400;
    color: var(--noir);
    line-height: 1.4;
  }

  .task-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .cat-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  .cat-deadline { background: var(--urgent-bg); color: var(--urgent-text); }
  .cat-videography { background: var(--gold-bg); color: var(--gold-text); }
  .cat-marykay { background: #FBE9F1; color: #8A2A52; }
  .cat-content { background: var(--blue-bg); color: var(--blue-text); }
  .cat-church { background: var(--green-bg); color: var(--green-text); }
  .cat-personal { background: #F3F0F5; color: #5A4060; }

  .priority-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .p-urgent { background: var(--mk-pink); }
  .p-high { background: var(--mk-gold); }
  .p-normal { background: #B0A0B8; }

  /* DELETE BTN */
  .task-delete {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .task-card:hover .task-delete { opacity: 0.5; }
  .task-delete:hover { opacity: 1 !important; color: var(--mk-pink); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--muted);
    font-size: 13px;
  }

  /* DONE SECTION TOGGLE */
  .done-toggle {
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .done-toggle-arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-size: 10px;
  }

  .done-toggle.open .done-toggle-arrow { transform: rotate(90deg); }

  /* PROGRESS BAR */
  .progress-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    height: 4px;
    margin-top: 10px;
    overflow: hidden;
  }
  .progress-bar {
    height: 4px;
    background: var(--mk-gold);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* BOTTOM SPACER */
  .spacer { height: 3rem; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Age's <span>Agenda</span></div>
      <div class="header-date" id="todayDate"></div>
    </div>
    <div>
      <div class="header-stats">
        <div class="stat-pill"><strong id="doneCount">0</strong> done</div>
        <div class="stat-pill"><strong id="leftCount">0</strong> left</div>
      </div>
      <div class="progress-wrap" style="margin-top:8px; width:130px;">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('deadline', this)">Deadline</button>
    <button class="filter-btn" onclick="setFilter('marykay', this)">Mary Kay</button>
    <button class="filter-btn" onclick="setFilter('videography', this)">Videography</button>
    <button class="filter-btn" onclick="setFilter('content', this)">Content</button>
    <button class="filter-btn" onclick="setFilter('church', this)">Church</button>
    <button class="filter-btn" onclick="setFilter('personal', this)">Personal</button>
  </div>
</div>

<div class="main">

  <div class="add-bar">
    <input class="add-input" id="newTaskInput" type="text" placeholder="Add a task..." />
    <select class="cat-select" id="newTaskCat">
      <option value="deadline">Deadline</option>
      <option value="marykay" selected>Mary Kay</option>
      <option value="videography">Videography</option>
      <option value="content">Content</option>
      <option value="church">Church</option>
      <option value="personal">Personal</option>
    </select>
    <button class="add-btn" onclick="addTask()">+</button>
  </div>

  <div id="taskList"></div>
  <div class="spacer"></div>
</div>

<script>
const STORAGE_KEY = 'age-agenda-v3';

const DEFAULT_TASKS = [
  { id: 1, text: "Final apartment walkthrough and return keys", note: "Vacate by June 4", cat: "deadline", priority: "urgent", done: false },
  { id: 2, text: "Update mailing address everywhere", note: "USPS, Mary Kay InTouch, bank, subscriptions", cat: "deadline", priority: "urgent", done: false },
  { id: 3, text: "Unpack and set up workspace", note: "Computer, camera gear, MK product storage", cat: "deadline", priority: "urgent", done: false },
  { id: 4, text: "Confirm birthday party job at Martin's West", note: "Baltimore videography, verify date and timeline", cat: "videography", priority: "high", done: false },
  { id: 5, text: "Build shot list for birthday party", note: "70th celebration, Keeler Productions", cat: "videography", priority: "high", done: false },
  { id: 6, text: "Charge batteries and prep camera gear", note: "Cards, backup gear, check all equipment", cat: "videography", priority: "high", done: false },
  { id: 7, text: "Send reengagement message to both units", note: "Legacy Leaders and Million Dollar Visionaries", cat: "marykay", priority: "high", done: false },
  { id: 8, text: "Follow up with Chelsea", note: "Priority prospect, re-warm after time away", cat: "marykay", priority: "high", done: false },
  { id: 9, text: "Review 20-Day Selling Challenge results", note: "May 12–31 wrapped, identify follow-ups and recognition", cat: "marykay", priority: "high", done: false },
  { id: 10, text: "Map out June unit activity plan", note: "Incentives, challenges, events for both units", cat: "marykay", priority: "normal", done: false },
  { id: 11, text: "Check Points to Paradise team standings", note: "May–October challenge, recap after time away", cat: "marykay", priority: "normal", done: false },
  { id: 12, text: "Get back on 30-day content calendar", note: "@agepatrice across IG, TikTok, Facebook", cat: "content", priority: "high", done: false },
  { id: 13, text: "Film a 'back from the cruise' piece", note: "Magnetic Main Character content, reintroduce yourself", cat: "content", priority: "high", done: false },
  { id: 14, text: "Schedule content batch for the week", note: "Plan posts ahead so you stay consistent post-move", cat: "content", priority: "normal", done: false },
  { id: 15, text: "Check in on Mt. Zion AV and social media", note: "Anything pending while you were away", cat: "church", priority: "normal", done: false },
  { id: 16, text: "Kingdom Creators outreach and planning", note: "Pick back up where you left off", cat: "church", priority: "normal", done: false },
  { id: 17, text: "Rest and transition intentionally", note: "You just moved and came off a cruise. Grace, not grind.", cat: "personal", priority: "normal", done: false },
];

let tasks = [];
let activeFilter = 'all';
let showDone = false;
let nextId = 100;

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      tasks = data.tasks || DEFAULT_TASKS;
      nextId = data.nextId || 100;
    } else {
      tasks = DEFAULT_TASKS;
    }
  } catch(e) {
    tasks = DEFAULT_TASKS;
  }
  render();
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, nextId }));
  } catch(e) {}
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function addTask() {
  const input = document.getElementById('newTaskInput');
  const cat = document.getElementById('newTaskCat').value;
  const text = input.value.trim();
  if (!text) return;
  tasks.unshift({ id: nextId++, text, note: '', cat, priority: 'normal', done: false });
  input.value = '';
  save();
  render();
  input.focus();
}

document.getElementById('newTaskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function deleteTask(id, e) {
  e.stopPropagation();
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function catLabel(cat) {
  const map = { deadline: 'Deadline', marykay: 'Mary Kay', videography: 'Videography', content: 'Content', church: 'Church', personal: 'Personal' };
  return map[cat] || cat;
}

function priorityOrder(p) {
  return p === 'urgent' ? 0 : p === 'high' ? 1 : 2;
}

function render() {
  const list = document.getElementById('taskList');
  const filtered = activeFilter === 'all' ? tasks : tasks.filter(t => t.cat === activeFilter);
  const active = filtered.filter(t => !t.done).sort((a,b) => priorityOrder(a.priority) - priorityOrder(b.priority));
  const done = filtered.filter(t => t.done);

  const allTotal = tasks.length;
  const allDone = tasks.filter(t => t.done).length;
  document.getElementById('doneCount').textContent = allDone;
  document.getElementById('leftCount').textContent = allTotal - allDone;
  const pct = allTotal ? Math.round((allDone / allTotal) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';

  const today = new Date();
  document.getElementById('todayDate').textContent = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  let html = '';

  if (active.length === 0 && done.length === 0) {
    html = '<div class="empty-state">Nothing here. Add something above.</div>';
  } else {
    if (active.length > 0) {
      html += sectionLabel('Up next', active.length);
      active.forEach(t => { html += taskHTML(t); });
    }

    if (done.length > 0) {
      html += `<div style="margin-top:1rem;">
        <button class="done-toggle ${showDone ? 'open' : ''}" onclick="toggleDoneSection()">
          <span class="done-toggle-arrow">▶</span> ${done.length} completed
        </button>
      </div>`;
      if (showDone) {
        done.forEach(t => { html += taskHTML(t); });
      }
    }
  }

  list.innerHTML = html;
}

function sectionLabel(label, count) {
  return `<div class="section-label">
    <span class="section-label-text">${label}</span>
    <span class="section-count">${count}</span>
    <div class="section-line"></div>
  </div>`;
}

function taskHTML(t) {
  const priorityDot = `<div class="priority-dot p-${t.priority === 'urgent' ? 'urgent' : t.priority === 'high' ? 'high' : 'normal'}"></div>`;
  return `<div class="task-card ${t.done ? 'done' : ''}" data-cat="${t.cat}" onclick="toggleDone(${t.id})">
    <div class="task-check"></div>
    <div class="task-body">
      <div class="task-text">${escHtml(t.text)}</div>
      ${t.note ? `<div class="task-note">${escHtml(t.note)}</div>` : ''}
      <div class="task-meta">
        ${priorityDot}
        <span class="cat-badge cat-${t.cat}">${catLabel(t.cat)}</span>
      </div>
    </div>
    <button class="task-delete" onclick="deleteTask(${t.id}, event)" aria-label="Delete task">×</button>
  </div>`;
}

function toggleDoneSection() {
  showDone = !showDone;
  render();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Age's Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --mk-pink: #E8417A;
  --mk-gold: #C8922A;
  --noir: #1A1018;
  --surface: #F7F3F5;
  --card: #FFFFFF;
  --muted: #8C7A87;
  --border: rgba(26,16,24,0.1);
  --overdue: #C0315D;
  --overdue-bg: #FFF0F4;
  --soon-bg: #FFF8EE;
  --soon: #9B6B15;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--noir); min-height: 100vh; }

/* ── HEADER ── */
.header {
  background: var(--noir);
  padding: 1.4rem 1.25rem 0;
  position: sticky; top: 0; z-index: 100;
}
.header-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.9rem; }
.header-title { font-family: 'Playfair Display', serif; font-size: 1.55rem; color: #fff; line-height: 1.1; }
.header-title span { color: var(--mk-pink); }
.header-date { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: .08em; text-transform: uppercase; margin-top: 4px; }
.stats { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.stat-pill {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.14);
  border-radius: 20px; padding: 3px 10px; font-size: 11px; color: rgba(255,255,255,0.65);
}
.stat-pill strong { color: var(--mk-gold); }
.progress-wrap { height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 8px 0 10px; overflow: hidden; }
.progress-bar { height: 3px; background: var(--mk-gold); border-radius: 10px; transition: width .4s ease; }

/* ── FILTER BAR ── */
.filter-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px; padding: 5px 13px; font-size: 12px; font-family: 'DM Sans', sans-serif;
  color: rgba(255,255,255,0.5); cursor: pointer; white-space: nowrap; transition: all .18s; flex-shrink: 0;
}
.filter-btn.active { background: var(--mk-pink); border-color: var(--mk-pink); color: #fff; }
.filter-btn .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

/* ── SORT BAR ── */
.sort-bar { display: flex; gap: 6px; padding: 8px 1.25rem 4px; align-items: center; flex-wrap: wrap; }
.sort-label { font-size: 11px; color: var(--muted); }
.sort-btn {
  font-size: 11px; font-family: 'DM Sans', sans-serif; padding: 3px 10px;
  border-radius: 20px; border: 1px solid var(--border); background: var(--card);
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.sort-btn.active { background: var(--noir); color: #fff; border-color: var(--noir); }

/* ── MAIN ── */
.main { padding: 0.75rem 1.25rem 1.25rem; max-width: 680px; margin: 0 auto; }

/* ── WHAT'S NEXT PANEL ── */
.focus-panel {
  background: var(--noir); border-radius: 14px; padding: 14px 16px; margin-bottom: 1.1rem;
  position: relative; overflow: hidden;
}
.focus-panel::before {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 120px; height: 120px; border-radius: 50%;
  background: radial-gradient(circle, rgba(232,65,122,0.18) 0%, transparent 70%);
  pointer-events: none;
}
.focus-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.focus-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: #fff; }
.focus-subtitle { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.focus-refresh {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
  border-radius: 8px; padding: 4px 10px; font-size: 11px; color: rgba(255,255,255,0.5);
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .15s;
}
.focus-refresh:hover { background: rgba(255,255,255,0.14); }
.focus-items { display: flex; flex-direction: column; gap: 6px; }
.focus-item {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 9px 12px; display: flex; align-items: flex-start; gap: 10px;
  cursor: pointer; transition: background .15s;
}
.focus-item:hover { background: rgba(255,255,255,0.1); }
.focus-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.focus-item-body { flex: 1; min-width: 0; }
.focus-item-text { font-size: 13px; color: rgba(255,255,255,0.9); line-height: 1.4; }
.focus-item-meta { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; }
.focus-item-reason {
  font-size: 10px; color: var(--mk-gold); background: rgba(200,146,42,0.15);
  border-radius: 6px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0; align-self: flex-start;
}
.focus-check {
  width: 18px; height: 18px; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 50%;
  flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
  transition: all .18s;
}
.focus-empty { font-size: 13px; color: rgba(255,255,255,0.35); text-align: center; padding: 8px 0; }

/* ── ADD PANEL ── */
.add-panel {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px; margin-bottom: 1.1rem;
}
.add-row { display: flex; gap: 8px; align-items: stretch; }
.add-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 9px 13px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--noir);
  outline: none; transition: border-color .18s;
}
.add-input:focus { border-color: var(--mk-pink); }
.add-input::placeholder { color: var(--muted); }
.add-btn {
  background: var(--mk-pink); border: none; border-radius: 9px; padding: 9px 16px;
  font-size: 20px; color: white; cursor: pointer; line-height: 1; transition: opacity .18s, transform .1s; flex-shrink: 0;
}
.add-btn:active { transform: scale(.95); opacity: .85; }
.add-note {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 8px 13px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--noir);
  outline: none; resize: none; margin-top: 8px; transition: border-color .18s;
}
.add-note:focus { border-color: var(--mk-pink); }
.add-note::placeholder { color: var(--muted); }
.add-extras { display: flex; gap: 8px; margin-top: 9px; flex-wrap: wrap; align-items: center; }
.add-select {
  background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 7px 10px; font-size: 12px; font-family: 'DM Sans', sans-serif;
  color: var(--noir); outline: none; cursor: pointer;
}
.add-date {
  background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 7px 10px; font-size: 12px; font-family: 'DM Sans', sans-serif;
  color: var(--noir); outline: none; flex: 1; min-width: 130px;
}
.add-date:focus { border-color: var(--mk-pink); }
.new-cat-btn {
  font-size: 11px; color: var(--mk-pink); background: none; border: 1px dashed var(--mk-pink);
  border-radius: 9px; padding: 7px 11px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  white-space: nowrap; transition: background .15s;
}
.new-cat-btn:hover { background: var(--overdue-bg); }

/* ── SECTION HEADERS ── */
.section-label { display: flex; align-items: center; gap: 8px; margin: 1.1rem 0 .5rem; }
.section-label-text { font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.section-line { flex: 1; height: 1px; background: var(--border); }
.section-count { font-size: 10px; color: var(--muted); }
.section-overdue .section-label-text { color: var(--overdue); }

/* ── TASK CARDS ── */
.task-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: .8rem 1rem; margin-bottom: 7px; display: flex; align-items: flex-start;
  gap: 10px; cursor: pointer; transition: border-color .18s, box-shadow .18s;
  position: relative; overflow: hidden;
}
.task-card:hover { border-color: rgba(26,16,24,0.2); box-shadow: 0 2px 8px rgba(26,16,24,0.06); }
.task-card.overdue-card { border-color: rgba(192,49,93,0.25); background: #FFFCFC; }
.task-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 12px 0 0 12px; }
.task-card.done { opacity: .42; }
.task-card.done .task-text { text-decoration: line-through; color: var(--muted); }
.task-card.focus-highlight { box-shadow: 0 0 0 2px var(--mk-gold); border-color: transparent; }

.task-check {
  width: 20px; height: 20px; border: 1.5px solid rgba(26,16,24,0.2); border-radius: 50%;
  flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
  transition: all .18s; background: transparent;
}
.task-card.done .task-check { background: var(--mk-pink); border-color: var(--mk-pink); }
.task-card.done .task-check::after {
  content: ''; display: block; width: 5px; height: 9px;
  border: 1.5px solid white; border-left: none; border-top: none;
  transform: rotate(45deg) translate(-1px,-1px);
}

.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 14px; color: var(--noir); line-height: 1.4; }
.task-note { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

.cat-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; letter-spacing: .03em; white-space: nowrap; }
.due-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.due-overdue { background: var(--overdue-bg); color: var(--overdue); }
.due-soon { background: var(--soon-bg); color: var(--soon); }
.due-normal { background: #F0EDF3; color: #5A4060; }

.task-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.task-action-btn {
  background: none; border: none; font-size: 14px; color: var(--muted);
  cursor: pointer; padding: 2px 4px; opacity: 0; transition: opacity .15s; line-height: 1;
}
.task-card:hover .task-action-btn { opacity: 0.5; }
.task-action-btn:hover { opacity: 1 !important; }
.task-edit-btn:hover { color: var(--mk-gold); }
.task-delete-btn:hover { color: var(--mk-pink); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 13px; }

/* ── DONE TOGGLE ── */
.done-toggle {
  background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 12px;
  color: var(--muted); cursor: pointer; padding: 4px 0; display: flex; align-items: center; gap: 6px;
}
.done-toggle-arrow { display: inline-block; transition: transform .2s; font-size: 10px; }
.done-toggle.open .done-toggle-arrow { transform: rotate(90deg); }

/* ── DRAWER ── */
.overlay {
  position: fixed; inset: 0; background: rgba(26,16,24,0.5);
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity .22s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.drawer {
  position: fixed; bottom: 0; left: 0; right: 0; max-width: 680px; margin: 0 auto;
  background: var(--card); border-radius: 20px 20px 0 0; padding: 1.5rem 1.25rem 2rem;
  z-index: 201; transform: translateY(100%); transition: transform .28s cubic-bezier(.32,.72,0,1);
  max-height: 90vh; overflow-y: auto;
}
.drawer.open { transform: translateY(0); }
.drawer-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 1.25rem; }
.drawer-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 1rem; color: var(--noir); }
.drawer-field { margin-bottom: 12px; }
.drawer-label { font-size: 11px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 5px; display: block; }
.drawer-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 9px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--noir); outline: none; transition: border-color .18s;
}
.drawer-input:focus { border-color: var(--mk-pink); }
.drawer-textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 9px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--noir);
  outline: none; resize: vertical; min-height: 70px; transition: border-color .18s;
}
.drawer-textarea:focus { border-color: var(--mk-pink); }
.drawer-row { display: flex; gap: 8px; }
.drawer-row .drawer-field { flex: 1; }
.drawer-select {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 9px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--noir); outline: none; cursor: pointer;
}
.drawer-date {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 9px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--noir); outline: none;
}
.drawer-btns { display: flex; gap: 8px; margin-top: 1rem; }
.drawer-save {
  flex: 1; background: var(--mk-pink); color: #fff; border: none; border-radius: 10px;
  padding: 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 500; transition: opacity .18s;
}
.drawer-save:hover { opacity: .88; }
.drawer-cancel {
  background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 18px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer;
}

/* ── NEW CATEGORY MODAL ── */
.modal {
  position: fixed; inset: 0; background: rgba(26,16,24,0.55); z-index: 300;
  display: flex; align-items: center; justify-content: center; padding: 1.25rem;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal.open { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--card); border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 360px;
  transform: scale(.94); transition: transform .2s;
}
.modal.open .modal-box { transform: scale(1); }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 1rem; }
.modal-field { margin-bottom: 12px; }
.modal-label { font-size: 11px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 5px; display: block; }
.modal-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
  padding: 9px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--noir); outline: none;
}
.modal-input:focus { border-color: var(--mk-pink); }
.color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .15s, transform .12s;
}
.color-swatch.selected { border-color: var(--noir); transform: scale(1.15); }
.modal-btns { display: flex; gap: 8px; margin-top: 1rem; }
.modal-save {
  flex: 1; background: var(--mk-pink); color: #fff; border: none; border-radius: 10px;
  padding: 11px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 500;
}
.modal-cancel {
  background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 10px;
  padding: 11px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer;
}


/* ── SUGGEST PANEL ── */
.suggest-panel {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 16px; margin-bottom: 1.1rem; position: relative; overflow: hidden;
}
.suggest-panel::before {
  content: ''; position: absolute; bottom: -20px; right: -20px;
  width: 90px; height: 90px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,146,42,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.suggest-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.suggest-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--noir); }
.suggest-subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
.suggest-trigger {
  background: var(--noir); border: none; border-radius: 9px; padding: 7px 14px;
  font-size: 12px; color: rgba(255,255,255,0.85); cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: opacity .18s; white-space: nowrap;
}
.suggest-trigger:hover { opacity: .82; }
.suggest-trigger:disabled { opacity: .45; cursor: default; }
.suggest-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
  padding: 12px 14px; margin-top: 2px;
}
.suggest-task-text { font-size: 14px; color: var(--noir); line-height: 1.45; font-weight: 400; }
.suggest-task-note { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
.suggest-why {
  display: inline-block; margin-top: 8px; font-size: 11px; color: var(--mk-gold);
  background: rgba(200,146,42,0.1); border-radius: 6px; padding: 2px 8px; line-height: 1.5;
}
.suggest-actions { display: flex; gap: 8px; margin-top: 12px; }
.suggest-yes {
  flex: 1; background: var(--mk-pink); color: #fff; border: none; border-radius: 9px;
  padding: 9px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer;
  font-weight: 500; transition: opacity .18s;
}
.suggest-yes:hover { opacity: .88; }
.suggest-skip {
  background: var(--surface); color: var(--muted); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 16px; font-size: 13px;
  font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background .15s;
}
.suggest-skip:hover { background: #EDE8F0; }
.suggest-loading {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  font-size: 13px; color: var(--muted);
}
.suggest-spinner {
  width: 16px; height: 16px; border: 2px solid var(--border);
  border-top-color: var(--mk-gold); border-radius: 50%;
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.spacer { height: 3rem; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">Age's <span>Agenda</span></div>
      <div class="header-date" id="todayDate"></div>
    </div>
    <div>
      <div class="stats">
        <div class="stat-pill" id="overdueCount" style="display:none; background:rgba(192,49,93,0.15); color:#E8417A; border-color:rgba(232,65,122,0.25);"></div>
        <div id="syncPill" class="stat-pill" style="display:none;"></div>
        <div class="stat-pill"><strong id="doneCountEl">0</strong> done</div>
        <div class="stat-pill"><strong id="leftCountEl">0</strong> left</div>
      </div>
      <div class="progress-wrap" style="margin-top:8px;">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </div>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  </div>
</div>

<!-- SORT BAR -->
<div class="sort-bar">
  <span class="sort-label">Sort:</span>
  <button class="sort-btn active" onclick="setSort('duedate',this)">Due date</button>
  <button class="sort-btn" onclick="setSort('added',this)">Date added</button>
  <button class="sort-btn" onclick="setSort('cat',this)">Category</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- WHAT'S NEXT PANEL -->
  <div class="focus-panel">
    <div class="focus-header">
      <div>
        <div class="focus-title">What's next</div>
        <div class="focus-subtitle" id="focusSubtitle">Analyzing your tasks...</div>
      </div>
      <button class="focus-refresh" onclick="renderFocus()">Refresh ↺</button>
    </div>
    <div class="focus-items" id="focusItems"></div>
  </div>


  <!-- SUGGEST PANEL -->
  <div class="suggest-panel">
    <div class="suggest-header">
      <div>
        <div class="suggest-title">Suggest a task</div>
        <div class="suggest-subtitle" id="suggestSubtitle">Tap below and I'll think of one thing for you</div>
      </div>
      <button class="suggest-trigger" id="suggestBtn" onclick="getSuggestion()">Suggest one ✦</button>
    </div>
    <div id="suggestArea"></div>
  </div>

  <!-- ADD PANEL -->
  <div class="add-panel">
    <div class="add-row">
      <input class="add-input" id="newTaskInput" type="text" placeholder="Add a task..." />
      <button class="add-btn" onclick="addTask()">+</button>
    </div>
    <textarea class="add-note" id="newTaskNote" placeholder="Note (optional)..." rows="2"></textarea>
    <div class="add-extras">
      <select class="add-select" id="newTaskCat"></select>
      <input class="add-date" id="newTaskDue" type="date" title="Due date (optional)" />
      <button class="new-cat-btn" onclick="openNewCatModal()">+ Category</button>
    </div>
  </div>

  <div id="taskList"></div>
  <div class="spacer"></div>
</div>

<!-- EDIT DRAWER -->

async function supaFetch(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── DATE HELPERS ──
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const due = new Date(dateStr + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((due - now) / 86400000);
}
function dueBadgeHTML(dateStr) {
  if (!dateStr) return '';
  const days = daysUntil(dateStr);
  const label = days < 0
    ? (days === -1 ? 'Yesterday' : Math.abs(days) + 'd ago')
    : days === 0 ? 'Today'
    : days === 1 ? 'Tomorrow'
    : new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });
  const cls = days < 0 ? 'due-overdue' : days <= 3 ? 'due-soon' : 'due-normal';
  return `<span class="due-badge ${cls}">📅 ${label}</span>`;
}

function hexToRgba(hex, a) {

  return `rgba(${r},${g},${b},${a})`;
}

// ── WHAT'S NEXT ENGINE ──
function computeFocus() {
  const active = tasks.filter(t => !t.done);
  if (!active.length) return [];

  // score each task: lower = more urgent
  const scored = active.map(t => {
    const days = daysUntil(t.due);
    let score = 1000;
    let reason = '';

    if (days !== null) {
      if (days < 0)      { score = 0;   reason = 'Overdue'; }
      else if (days === 0) { score = 10;  reason = 'Due today'; }
      else if (days === 1) { score = 20;  reason = 'Due tomorrow'; }
      else if (days <= 3)  { score = 30 + days; reason = 'Due soon'; }
      else                 { score = 100 + days; reason = 'Coming up'; }
    } else {
      reason = 'No deadline';
      score = 500;
    }

    return { ...t, score, reason };
  });

  // sort by score
  scored.sort((a,b) => a.score - b.score);

  // category balance: pick up to 5 tasks, but try not to take more than 2 from the same cat in a row
  const picks = [];
  const catCounts = {};
  const remaining = [...scored];

  // first pass: take anything overdue or due today/tomorrow (score <= 20)
  for (let i = remaining.length - 1; i >= 0; i--) {
    if (remaining[i].score <= 20 && picks.length < 5) {
      picks.push(remaining.splice(i, 1)[0]);
    }
  }
  picks.sort((a,b) => a.score - b.score);

  // second pass: fill up to 5 with category balance
  for (const t of remaining) {
    if (picks.length >= 5) break;
    const cc = catCounts[t.cat] || 0;
    // allow max 2 per category unless nothing else available
    if (cc < 2 || picks.length < 3) {
      picks.push(t);
      catCounts[t.cat] = cc + 1;
    }
  }

  // if still under 5, fill from whatever's left
  for (const t of remaining) {
    if (picks.length >= 5) break;
    if (!picks.find(p => p.id === t.id)) picks.push(t);
  }

  return picks.slice(0, 5);
}

function renderFocus() {
  const picks = computeFocus();
  const el = document.getElementById('focusItems');
  const sub = document.getElementById('focusSubtitle');

  if (!picks.length) {
    el.innerHTML = '<div class="focus-empty">All done! Nothing left to work on.</div>';
    sub.textContent = 'You\'re clear.';
    return;
  }

  const overduePicks = picks.filter(p => p.score === 0).length;
  const todayPicks = picks.filter(p => p.score === 10).length;
  if (overduePicks > 0) sub.textContent = `${overduePicks} overdue, across ${new Set(picks.map(p=>p.cat)).size} areas`;
  else if (todayPicks > 0) sub.textContent = `${todayPicks} due today, balanced across areas`;
  else sub.textContent = `Top ${picks.length} picks across ${new Set(picks.map(p=>p.cat)).size} areas`;

  el.innerHTML = picks.map(p => {
    const c = getCat(p.cat);
    const days = daysUntil(p.due);
    const dueLabel = p.due
      ? (days < 0 ? Math.abs(days)+'d overdue' : days === 0 ? 'Today' : days === 1 ? 'Tomorrow' : p.due)
      : 'No due date';
    return `<div class="focus-item" onclick="scrollToTask(${p.id})">
      <div class="focus-check"></div>
      <div class="focus-item-body">
        <div class="focus-item-text">${escHtml(p.text)}</div>
        <div class="focus-item-meta">${c.label} &middot; ${dueLabel}</div>
      </div>
      <div class="focus-item-reason">${p.reason}</div>
    </div>`;
  }).join('');
}

  const list = document.getElementById('taskList');
  const filtered = activeFilter === 'all' ? tasks : tasks.filter(t => t.cat===activeFilter);
  const active = filtered.filter(t => !t.done);
  const done = filtered.filter(t => t.done);

  const overdue = sortTasks(active.filter(t => t.due && daysUntil(t.due) < 0));
  const upcoming = sortTasks(active.filter(t => !t.due || daysUntil(t.due) >= 0));

  const allTotal = tasks.length, allDone = tasks.filter(t => t.done).length;
  const allOverdue = tasks.filter(t => !t.done && t.due && daysUntil(t.due) < 0).length;
  document.getElementById('doneCountEl').textContent = allDone;
  document.getElementById('leftCountEl').textContent = allTotal - allDone;
  document.getElementById('progressBar').style.width = (allTotal ? Math.round(allDone/allTotal*100) : 0) + '%';
  const op = document.getElementById('overdueCount');
  if (allOverdue > 0) { op.style.display=''; op.innerHTML = `<strong style="color:var(--overdue)">⚠ ${allOverdue}</strong> overdue`; }
  else { op.style.display='none'; }

  let html = '';
  if (overdue.length) {
    html += `<div class="section-label section-overdue"><span class="section-label-text">⚠ Overdue</span><span class="section-count">${overdue.length}</span><div class="section-line" style="background:rgba(192,49,93,0.2)"></div></div>`;
    overdue.forEach(t => { html += taskHTML(t); });
  }
  if (upcoming.length) {
    html += sectionLabel('Up next', upcoming.length);
    upcoming.forEach(t => { html += taskHTML(t); });
  }
  if (!overdue.length && !upcoming.length && !done.length) {
    html = '<div class="empty-state">Nothing here yet. Add something above.</div>';
  }
  if (done.length) {
    html += `<div style="margin-top:1rem;">
      <button class="done-toggle ${showDone?'open':''}" onclick="toggleDoneSection()">
        <span class="done-toggle-arrow">▶</span>&nbsp;${done.length} completed
      </button>
    </div>`;
    if (showDone) done.forEach(t => { html += taskHTML(t); });
  }
  list.innerHTML = html;
}

function sectionLabel(label, count) {
  return `<div class="section-label"><span class="section-label-text">${label}</span><span class="section-count">${count}</span><div class="section-line"></div></div>`;
}

function taskHTML(t) {
  const c = getCat(t.cat);
  const isOverdue = t.due && daysUntil(t.due) < 0 && !t.done;
  return `<div class="task-card ${t.done?'done':''} ${isOverdue?'overdue-card':''}"
    data-task-id="${t.id}"
    onclick="toggleDone(${t.id})">
    <style>.task-card[data-task-id="${t.id}"]:before{background:${c.color}}</style>
    <div class="task-check"></div>
    <div class="task-body">
      <div class="task-text">${escHtml(t.text)}</div>
      ${t.note ? `<div class="task-note">${escHtml(t.note)}</div>` : ''}
      <div class="task-meta">
        ${catBadgeHTML(t.cat)}
        ${t.due ? dueBadgeHTML(t.due) : ''}
      </div>
    </div>
    <div class="task-actions">
      <button class="task-action-btn task-edit-btn" onclick="openDrawer(${t.id},event)" title="Edit">✏️</button>
      <button class="task-action-btn task-delete-btn" onclick="deleteTask(${t.id},event)" title="Delete">×</button>
    </div>
  </div>`;
}

function toggleDoneSection() { showDone = !showDone; render(); }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getSuggestion() {
  const btn = document.getElementById('suggestBtn');
  const area = document.getElementById('suggestArea');
  const sub = document.getElementById('suggestSubtitle');

  btn.disabled = true;

  const activeTasks = tasks.filter(t => !t.done).map(t => t.text.toLowerCase());
  const doneTasks = tasks.filter(t => t.done).map(t => t.text.toLowerCase());
  const allTaskText = [...activeTasks, ...doneTasks].join(' ');

  // figure out which categories have the fewest active tasks (neglected areas)
  const catCounts = {};
  cats.forEach(c => { catCounts[c.id] = 0; });
  tasks.filter(t => !t.done).forEach(t => { if (catCounts[t.cat] !== undefined) catCounts[t.cat]++; });
  const leastUsedCats = Object.entries(catCounts).sort((a,b) => a[1]-b[1]).map(e => e[0]);

  // filter out already-skipped and already-on-list suggestions
  const eligible = SUGGESTION_BANK.filter(s => {
    // not already skipped
    if (skippedSuggestions.includes(s.task)) return false;
    // not already on the list (fuzzy: check if first 6 words match any task)
    const shortForm = s.task.toLowerCase().split(' ').slice(0,6).join(' ');
    if (allTaskText.includes(shortForm)) return false;
    return true;
  });

  if (!eligible.length) {
    area.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:6px 0;">You have thought of everything! Clear some skips to see more ideas.</div>';
    sub.textContent = 'Nothing new to suggest right now';
    btn.disabled = false;
    return;
  }

  // score each suggestion
  const scored = eligible.map(s => {
    let score = 0;
    // boost if keywords match active task text
    if (s.keywords && s.keywords.some(k => allTaskText.includes(k.toLowerCase()))) score += 3;
    // boost if category is neglected
    const catRank = leastUsedCats.indexOf(s.cat);
    if (catRank === 0) score += 4;
    else if (catRank === 1) score += 2;
    else if (catRank === 2) score += 1;
    // small random factor so it doesn't always pick the same one
    score += Math.random() * 2;
    return { ...s, score };
  });

  scored.sort((a,b) => b.score - a.score);
  const pick = scored[0];
  pendingSuggestion = pick;

  // find the matching cat object (fall back to first cat)
  const catObj = cats.find(c => c.id === pick.cat) || cats[0];

  area.innerHTML = `
    <div class="suggest-card">
      <div class="suggest-task-text">${escHtml(pick.task)}</div>
      ${pick.note ? '<div class="suggest-task-note">' + escHtml(pick.note) + '</div>' : ''}
      <span class="suggest-why">✦ ${escHtml(pick.why)}</span>
      <div class="suggest-actions">
        <button class="suggest-yes" onclick="acceptSuggestion()">Add this task</button>
        <button class="suggest-skip" onclick="skipSuggestion()">Not right now</button>
      </div>
    </div>`;

  sub.textContent = 'Here is one idea...';
  btn.disabled = false;
}

function acceptSuggestion() {
  if (!pendingSuggestion) return;
  const catObj = cats.find(c => c.id === pendingSuggestion.cat) || cats[0];
  tasks.unshift({
    id: nextId++,
    text: pendingSuggestion.task,
    note: pendingSuggestion.note || '',
    cat: catObj.id,
    due: '',
    done: false
  });
  skippedSuggestions.push(pendingSuggestion.task);
  pendingSuggestion = null;
  save(); renderFocus(); render();
  document.getElementById('suggestArea').innerHTML = '<div style="font-size:13px;color:var(--muted);padding:6px 0;">Added! Tap to get another idea.</div>';
  document.getElementById('suggestSubtitle').textContent = 'Tap below and I'll think of one thing for you';
}

function skipSuggestion() {
  if (pendingSuggestion) {
    skippedSuggestions.push(pendingSuggestion.task);
    pendingSuggestion = null;
  }
  document.getElementById('suggestArea').innerHTML = '';
  document.getElementById('suggestSubtitle').textContent = 'Tap below and I'll think of one thing for you';
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--noir); font-family: 'DM Sans', sans-serif; color: var(--text); overscroll-behavior: none; }

.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

.sort-btn.active { border-color: var(--gold); color: var(--gold); }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 20px 14px; }
.stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 600; line-height: 1; }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 3px; }
.filter-section-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; padding: 0 20px; }
.filter-scroll { overflow-x: auto; padding: 0 20px 10px; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-pills { display: flex; gap: 6px; width: max-content; }
.pill { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: all .2s; display: flex; align-items: center; gap: 5px; }
.pill.active { background: var(--pink); border-color: var(--pink); color: white; font-weight: 500; }
.pill.active-date { background: var(--gold); border-color: var(--gold); color: white; font-weight: 500; }
.pill.overdue-pill.active { background: var(--red); border-color: var(--red); }
.pill-count { font-size: 10px; background: rgba(255,255,255,.15); border-radius: 10px; padding: 1px 5px; min-width: 18px; text-align: center; }
.pill:not(.active):not(.active-date) .pill-count { background: var(--surface2); color: var(--text3); }
.task-scroll { flex: 1; overflow-y: auto; padding: 0 20px 100px; scrollbar-width: none; }
.task-scroll::-webkit-scrollbar { display: none; }
.section-header { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); padding: 12px 0 8px; display: flex; align-items: center; gap: 8px; }
.section-header .inprogress-dot { width: 6px; height: 6px; border-radius: 50%; background: #85B7EB; display: inline-block; }
.task-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; cursor: pointer; transition: border-color .2s, background .2s; display: flex; gap: 12px; align-items: flex-start; }
.task-card:hover, .task-card.expanded { border-color: var(--border2); background: var(--surface2); }
.task-card.done-card { opacity: .4; }
.task-card.overdue-card { border-color: rgba(226,75,74,.3); }

.check-circle.checked { background: #1D9E75; border-color: #1D9E75; }
.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }

.overdue-badge { font-size: 10px; background: rgba(226,75,74,.15); color: #F09595; padding: 1px 7px; border-radius: 10px; font-weight: 500; }

.s-notstarted { background: rgba(255,255,255,.06); color: var(--text3); }
.s-inprogress { background: rgba(56,138,221,.15); color: #85B7EB; }
.s-waiting { background: rgba(239,159,39,.12); color: #FAC775; }
.s-done { background: rgba(29,158,117,.12); color: #5DCAA5; }
.p-dot { width: 8px; height: 8px; border-radius: 50%; }
.p-high { background: #E24B4A; }
.p-med { background: #EF9F27; }
.p-low { background: #1D9E75; }
.expand-panel { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
.expand-notes { font-size: 13px; color: var(--text2); line-height: 1.6; white-space: pre-wrap; margin-bottom: 10px; }

.btn-sm { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 5px; }
.btn-sm.danger { border-color: rgba(226,75,74,.3); color: #F09595; }
.fab { position: fixed; bottom: 90px; right: max(20px, calc(50vw - 220px)); width: 56px; height: 56px; border-radius: 50%; background: var(--pink); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(232,65,122,.4); z-index: 50; transition: transform .2s; }

.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--noir2); border-top: 0.5px solid var(--border2); display: flex; padding: 12px 0 24px; z-index: 50; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 0; position: relative; }
.nav-item svg { width: 22px; height: 22px; stroke: var(--text3); stroke-width: 1.5; fill: none; transition: stroke .2s; }

.nav-item span { font-size: 10px; color: var(--text3); }
.nav-item.active span { color: var(--pink); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.center { align-items: center; }
.modal-sheet { background: var(--noir2); border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; scrollbar-width: none; }
.modal-sheet.center-sheet { border-radius: 24px; margin: 20px; max-height: 85vh; }

.modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }

.form-input:focus { border-color: var(--pink); }

.btn-cancel { padding: 14px 20px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 15px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.cat-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.cat-swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.cat-name-text { flex: 1; font-size: 14px; color: var(--text); }
.cat-count { font-size: 12px; color: var(--text3); }
.color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

.sort-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: var(--noir2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 6px; z-index: 100; min-width: 180px; }
.sort-option { font-size: 13px; padding: 10px 12px; border-radius: var(--radius-xs); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }

</head>

let categories = [];
let tasks = [];
let expandedId = null;
let activeFilter = "all";
let activeDateFilter = "all-dates";
let activeCatFilter = "all-cats";
let searchQ = "";
let sortBy = "priority";
let formPriority = "HIGH";
let formStatus = "Not Started";
let formCatId = "";
let editCatColorIdx = 0;
let editCatId = null;
let sortDropdownOpen = false;

const today = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
const parseDate = d => { if(!d) return null; const dt = new Date(d+"T00:00:00"); dt.setHours(0,0,0,0); return dt; };
const isToday = d => { const dt = parseDate(d); return dt && dt.getTime() === today().getTime(); };
const isOverdue = (d, done) => { const dt = parseDate(d); return dt && !done && dt < today(); };
const isThisWeek = d => { const dt = parseDate(d); if(!dt) return false; const t = today(); const end = new Date(t); end.setDate(t.getDate()+7); return dt >= t && dt <= end; };
const fmtDate = d => { if(!d) return ""; return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); };
const getCat = id => categories.find(c=>c.id===id) || {name:"Other",color_idx:7};
const pClass = p => p==="HIGH"?"p-high":p==="MEDIUM"?"p-med":"p-low";
const sClass = (s,done) => done?"s-done":s==="In Progress"?"s-inprogress":s==="Waiting"?"s-waiting":"s-notstarted";
const sLabel = (s,done) => done?"Done":s;

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2500);
}

async function init() {
  try {
    const {data:existingCats, error} = await sb.from("categories").select("id").limit(1);
    if (error) throw error;
    if (!existingCats || existingCats.length === 0) {
      await sb.from("categories").insert(SEED_CATS);
      await sb.from("tasks").insert(SEED_TASKS);
    }
    await loadAll();
    document.getElementById("loading-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    document.getElementById("date-label").textContent = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
    renderPills(); renderTasks(); updateNavBadge();
  } catch(e) {
    document.getElementById("loading-screen").innerHTML = '<div style="color:#F09595;font-size:14px;padding:20px;text-align:center">Could not connect to database.<br/>Check your connection and try refreshing.</div>';
  }
}

async function loadAll() {
  const [{data:cats},{data:tks}] = await Promise.all([
    sb.from("categories").select("*").order("name"),
    sb.from("tasks").select("*").order("created_at",{ascending:false})
  ]);
  categories = cats||[];
  tasks = tks||[];
}

function updateNavBadge() {
  const overdueCount = tasks.filter(t=>isOverdue(t.due,t.done)).length;
  document.querySelectorAll(".nav-badge").forEach(b=>b.remove());
  if (overdueCount > 0) {
    const badge = document.createElement("div");
    badge.className = "nav-badge";
    badge.textContent = overdueCount;
    document.getElementById("nav-high").appendChild(badge);
  }
}

function countView(key) {
  const active = tasks.filter(t=>!t.done);
  if (key==="all") return tasks.length;
  if (key==="high") return active.filter(t=>t.priority==="HIGH").length;
  if (key==="active") return active.length;
  if (key==="done") return tasks.filter(t=>t.done).length;
  return 0;
}
function countDate(key) {
  const active = tasks.filter(t=>!t.done);
  if (key==="all-dates") return active.length;
  if (key==="overdue") return active.filter(t=>isOverdue(t.due,t.done)).length;
  if (key==="today") return active.filter(t=>isToday(t.due)).length;
  if (key==="this-week") return active.filter(t=>isThisWeek(t.due)).length;
  if (key==="no-date") return active.filter(t=>!t.due).length;
  return 0;
}
function countCat(id) {
  if (id==="all-cats") return tasks.filter(t=>!t.done).length;
  return tasks.filter(t=>t.cat_id===id&&!t.done).length;
}

function renderStats() {
  const active = tasks.filter(t=>!t.done);
  const overdueCount = tasks.filter(t=>isOverdue(t.due,t.done)).length;
  document.getElementById("stats-row").innerHTML = `
    <div class="stat"><div class="stat-num" style="color:#E24B4A">${active.filter(t=>t.priority==="HIGH").length}</div><div class="stat-label">High</div></div>
    <div class="stat"><div class="stat-num" style="color:#F09595">${overdueCount}</div><div class="stat-label">Overdue</div></div>
    <div class="stat"><div class="stat-num" style="color:#85B7EB">${active.filter(t=>t.status==="In Progress").length}</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num" style="color:#5DCAA5">${tasks.filter(t=>t.done).length}</div><div class="stat-label">Done</div></div>
  `;
}

function renderPills() {
  const views = [{key:"all",label:"All"},{key:"high",label:"🔴 Priority"},{key:"active",label:"Active"},{key:"done",label:"Done"}];
  document.getElementById("view-pills").innerHTML = views.map(v=>{
    const c = countView(v.key);
    return `<button class="pill${activeFilter===v.key?" active":""}" onclick="setViewFilter('${v.key}')">${v.label} <span class="pill-count">${c}</span></button>`;
  }).join("");

  const dates = [
    {key:"all-dates",label:"Any date"},
    {key:"overdue",label:"⚠️ Overdue"},
    {key:"today",label:"Today"},
    {key:"this-week",label:"This week"},
    {key:"no-date",label:"No date"},
  ];
  document.getElementById("date-pills").innerHTML = dates.map(d=>{
    const c = countDate(d.key);
    const isActive = activeDateFilter===d.key;
    const cls = isActive?(d.key==="overdue"?"pill active overdue-pill":"pill active-date"):"pill";
    return `<button class="${cls}" onclick="setDateFilter('${d.key}')">${d.label} <span class="pill-count">${c}</span></button>`;
  }).join("");

  const allCatBtn = `<button class="pill${activeCatFilter==="all-cats"?" active":""}" onclick="setCatFilter('all-cats')">All <span class="pill-count">${countCat("all-cats")}</span></button>`;
  const catBtns = categories.map(c=>{
    const cnt = countCat(c.id);
    return `<button class="pill${activeCatFilter===c.id?" active":""}" onclick="setCatFilter('${c.id}')">${c.name} <span class="pill-count">${cnt}</span></button>`;
  }).join("");
  document.getElementById("cat-pills").innerHTML = allCatBtn + catBtns;
}

function setViewFilter(f) { activeFilter=f; renderPills(); renderTasks(); }
function setDateFilter(f) { activeDateFilter=f; renderPills(); renderTasks(); }
function setCatFilter(f) { activeCatFilter=f; renderPills(); renderTasks(); }

  if(el){el.classList.add("active");const sp=el.querySelector("span");if(sp)sp.textContent="✓";}
  sortDropdownOpen=false;
  document.getElementById("sort-dropdown").style.display="none";

  if(sortDropdownOpen && !e.target.closest("#sort-toggle-btn") && !e.target.closest("#sort-dropdown")){
    sortDropdownOpen=false;
    document.getElementById("sort-dropdown").style.display="none";
    document.getElementById("sort-toggle-btn").classList.remove("active");

});

function filterTasks() {
  let list = [...tasks];

  // Search
  if(searchQ){
    const q=searchQ.toLowerCase();
    list=list.filter(t=>t.name.toLowerCase().includes(q)||(t.notes||"").toLowerCase().includes(q)||(getCat(t.cat_id).name||"").toLowerCase().includes(q));
  }

  // View filter
  if(activeFilter==="high") list=list.filter(t=>t.priority==="HIGH"&&!t.done);
  else if(activeFilter==="active") list=list.filter(t=>!t.done);
  else if(activeFilter==="done") list=list.filter(t=>t.done);

  // Category filter
  if(activeCatFilter!=="all-cats") list=list.filter(t=>t.cat_id===activeCatFilter);

  // Date filter — In Progress tasks always included regardless
  if(activeDateFilter!=="all-dates"){
    list = list.filter(t=>{
      if(t.done) return false;
      // Always keep In Progress tasks
      if(t.status==="In Progress") return true;
      if(activeDateFilter==="overdue") return isOverdue(t.due,t.done);
      if(activeDateFilter==="today") return isToday(t.due);
      if(activeDateFilter==="this-week") return isThisWeek(t.due);
      if(activeDateFilter==="no-date") return !t.due;
      return true;
    });
  }

  // Sort
  list.sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(sortBy==="priority"){
      const pm={HIGH:0,MEDIUM:1,LOW:2};
      return (pm[a.priority]||2)-(pm[b.priority]||2);
    }
    if(sortBy==="due"){
      const aD=a.due?new Date(a.due).getTime():Infinity;
      const bD=b.due?new Date(b.due).getTime():Infinity;
      return aD-bD;
    }
    if(sortBy==="alpha") return a.name.localeCompare(b.name);
    return 0;
  });

  return list;
}

function renderTasks() {
  renderStats(); updateNavBadge();
  const list = filterTasks();
  const el = document.getElementById("task-scroll");
  if(!list.length){el.innerHTML='<div class="empty-state"><p>Nothing matches this filter</p></div>';return;}

  const dateFilterActive = activeDateFilter!=="all-dates";
  let html="", lastSec="";

  list.forEach(t=>{
    const done=t.done;
    const overdue=isOverdue(t.due,done);
    const todayDue=isToday(t.due);
    const isPinnedInProgress = dateFilterActive && t.status==="In Progress" && !done;

    let sec;
    if(done) sec="Completed";
    else if(isPinnedInProgress) sec="In Progress";
    else if(sortBy==="due"){
      if(overdue) sec="Overdue";
      else if(todayDue) sec="Due today";
      else if(t.due) sec="Upcoming";
      else sec="No due date";
    } else {
      sec=t.priority==="HIGH"?"High priority":t.priority==="MEDIUM"?"Medium priority":"Lower priority";
    }

    if(sec!==lastSec){
      const dot = sec==="In Progress"?'<span class="inprogress-dot"></span>':'';
      html+=`<div class="section-header">${dot}${sec}</div>`;
      lastSec=sec;
    }

    const cat=getCat(t.cat_id);
    const col=COLORS[cat.color_idx]||COLORS[7];
    const expanded=expandedId===t.id;
    const checkSvg=done?`<svg width="11" height="11" viewBox="0 0 24 24" stroke="white" stroke-width="2.5" fill="none"><polyline points="20 6 9 17 4 12"/></svg>`:"";

    let dueLabelHtml="";
    if(t.due){
      const cls=overdue?"due-text overdue":todayDue?"due-text today":"due-text";
      const prefix=overdue?"⚠️ Due ":todayDue?"Due today":"Due ";
      const dateStr=todayDue?"":fmtDate(t.due);
      dueLabelHtml=`<span class="${cls}">${prefix}${dateStr}</span>`;
      if(overdue) dueLabelHtml+=`<span class="overdue-badge">Overdue</span>`;
    }

    const cardClass = `task-card${done?" done-card":""}${overdue?" overdue-card":""}${isPinnedInProgress?" inprogress-pinned":""}${expanded?" expanded":""}`;

    html+=`<div class="${cardClass}" onclick="toggleExpand(${t.id},event)">
      <button class="check-circle${done?" checked":""}" onclick="toggleDone(${t.id},${done},event)" aria-label="Toggle complete">${checkSvg}</button>
      <div class="task-body">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          <span class="cat-tag" style="background:${col.bg};color:${col.text}">${cat.name}</span>
          ${dueLabelHtml}
        </div>
        ${expanded?`<div class="expand-panel">
          ${t.notes?`<div class="expand-notes">${t.notes}</div>`:""}
          <div class="expand-actions">
            <button class="btn-sm" onclick="openEditTask(${t.id},event)">
              <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </button>
            <button class="btn-sm danger" onclick="deleteTask(${t.id},event)">
              <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              Delete
            </button>
          </div>
        </div>`:""}
      </div>
      <div class="task-right">
        <span class="status-pill ${sClass(t.status,done)}">${sLabel(t.status,done)}</span>
        <div class="p-dot ${pClass(t.priority)}"></div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function toggleExpand(id,e){if(e.target.closest(".check-circle,.btn-sm"))return;expandedId=expandedId===id?null:id;renderTasks();}

async function toggleDone(id,currentDone,e){
  e.stopPropagation();
  const newDone=!currentDone;
  await sb.from("tasks").update({done:newDone,status:newDone?"Done":"Not Started"}).eq("id",id);
  const t=tasks.find(x=>x.id===id);
  if(t){t.done=newDone;t.status=newDone?"Done":"Not Started";}
  renderTasks();renderPills();
}

async function deleteTask(id,e){
  e.stopPropagation();
  if(!confirm("Delete this task?"))return;
  await sb.from("tasks").delete().eq("id",id);
  tasks=tasks.filter(t=>t.id!==id);
  expandedId=null;renderTasks();renderPills();showToast("Task deleted");
}

function onSearch(v){searchQ=v;renderTasks();}

function openAddTask(){
  formPriority="HIGH";formStatus="Not Started";formCatId=categories[0]?.id||"";
  showTaskModal(null);
}
function openEditTask(id,e){
  e.stopPropagation();
  const t=tasks.find(x=>x.id===id);if(!t)return;
  formPriority=t.priority;formStatus=t.status;formCatId=t.cat_id;
  showTaskModal(t);

function showTaskModal(t){
  const isEdit=!!t;
  const catOpts=categories.map(c=>`<option value="${c.id}"${formCatId===c.id?" selected":""}>${c.name}</option>`).join("");
  const priBtns=["HIGH","MEDIUM","LOW"].map(p=>`<button class="seg-btn${formPriority===p?" active":""}" onclick="setPri('${p}',${isEdit?t.id:'null'})">${p==="HIGH"?"🔴 High":p==="MEDIUM"?"🟡 Med":"🟢 Low"}</button>`).join("");
  const statBtns=["Not Started","In Progress","Waiting","Done"].map(s=>`<button class="seg-btn${formStatus===s?" active":""}" onclick="setStat('${s}',${isEdit?t.id:'null'})">${s}</button>`).join("");
  document.getElementById("modal-root").innerHTML=`
    <div class="modal-overlay" onclick="bgClose(event)">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="modal-title">${isEdit?"Edit task":"New task"}</div>
        <div class="form-group"><label class="form-label">Task name</label><input class="form-input" id="f-name" type="text" placeholder="What needs to get done?" value="${isEdit?t.name.replace(/"/g,'&quot;'):""}" /></div>
        <div class="form-group"><label class="form-label">Category</label><select class="form-input" id="f-cat" onchange="formCatId=this.value">${catOpts}</select></div>
        <div class="form-group"><label class="form-label">Priority</label><div class="seg-group cols3">${priBtns}</div></div>
        <div class="form-group"><label class="form-label">Status</label><div class="seg-group cols2">${statBtns}</div></div>
        <div class="form-group"><label class="form-label">Due date (optional)</label><input class="form-input" id="f-due" type="date" value="${isEdit&&t.due?t.due:""}" /></div>
        <div class="form-group"><label class="form-label">Notes (optional)</label><textarea class="form-input" id="f-notes" placeholder="Any details or reminders...">${isEdit&&t.notes?t.notes:""}</textarea></div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-main" onclick="${isEdit?`saveEdit(${t.id})`:"saveNew()"}">${isEdit?"Save changes":"Add task"}</button>
        </div>
      </div>
    </div>`;
}

function setPri(p,tid){formPriority=p;showTaskModal(tid?tasks.find(x=>x.id===tid)||null:null);}
function setStat(s,tid){formStatus=s;showTaskModal(tid?tasks.find(x=>x.id===tid)||null:null);}

async function saveNew(){
  const name=document.getElementById("f-name").value.trim();
  if(!name)return alert("Please enter a task name");
  const rec={name,cat_id:document.getElementById("f-cat").value,priority:formPriority,status:formStatus,due:document.getElementById("f-due").value||null,notes:document.getElementById("f-notes").value.trim(),done:formStatus==="Done"};
  const{data}=await sb.from("tasks").insert(rec).select().single();
  if(data)tasks.unshift(data);
  closeModal();renderTasks();renderPills();showToast("Task added");
}

async function saveEdit(id){
  const name=document.getElementById("f-name").value.trim();
  if(!name)return alert("Please enter a task name");
  const updates={name,cat_id:document.getElementById("f-cat").value,priority:formPriority,status:formStatus,due:document.getElementById("f-due").value||null,notes:document.getElementById("f-notes").value.trim(),done:formStatus==="Done"};
  await sb.from("tasks").update(updates).eq("id",id);
  const t=tasks.find(x=>x.id===id);if(t)Object.assign(t,updates);
  closeModal();expandedId=null;renderTasks();renderPills();showToast("Task saved");
}

        <div class="modal-title">Categories</div>
        <div style="max-height:200px;overflow-y:auto;margin-bottom:16px">${rows||'<p style="font-size:14px;color:var(--text3)">No categories yet</p>'}</div>
        <div style="border-top:0.5px solid var(--border);padding-top:16px">
          <p style="font-size:12px;color:var(--text3);margin-bottom:10px">${editCatId?"Edit category":"Add new category"}</p>
          <div class="form-group"><input class="form-input" id="cat-name-f" type="text" placeholder="Category name" value="${editCat?editCat.name:""}" /></div>
          <div class="color-grid">${dots}</div>
        </div>
        <div class="modal-actions" style="margin-top:16px">
          <button class="btn-cancel" onclick="closeModal()">Close</button>
          <button class="btn-main${editCatId?"":" gold"}" onclick="${editCatId?"saveCatEdit()":"addCat()"}">${editCatId?"Save changes":"Add category"}</button>
        </div>
      </div>
    </div>`;
}

function pickCatColor(i){editCatColorIdx=i;renderCatModal();}
function startEditCat(id,e){e.stopPropagation();editCatId=id;const cat=categories.find(c=>c.id===id);if(cat)editCatColorIdx=cat.color_idx;renderCatModal();}

async function addCat(){
  const name=document.getElementById("cat-name-f").value.trim();
  if(!name)return alert("Enter a category name");
  if(categories.find(c=>c.name.toLowerCase()===name.toLowerCase()))return alert("Category already exists");
  const newId="cat_"+Date.now();
  const{data}=await sb.from("categories").insert({id:newId,name,color_idx:editCatColorIdx}).select().single();
  if(data)categories.push(data);
  editCatColorIdx=(editCatColorIdx+1)%COLORS.length;
  renderPills();renderCatModal();showToast("Category added");
}

async function saveCatEdit(){
  const name=document.getElementById("cat-name-f").value.trim();
  if(!name)return alert("Enter a name");
  await sb.from("categories").update({name,color_idx:editCatColorIdx}).eq("id",editCatId);
  const cat=categories.find(c=>c.id===editCatId);
  if(cat){cat.name=name;cat.color_idx=editCatColorIdx;}
  editCatId=null;renderPills();renderTasks();renderCatModal();showToast("Category saved");
}

async function deleteCat(id,e){
  e.stopPropagation();
  if(!confirm("Delete this category?"))return;
  await sb.from("categories").delete().eq("id",id);
  categories=categories.filter(c=>c.id!==id);
  renderPills();renderCatModal();
}

function closeModal(){document.getElementById("modal-root").innerHTML="";}
function bgClose(e){if(e.target.classList.contains("modal-overlay"))closeModal();}

init();
</script>
</body>
</html>
